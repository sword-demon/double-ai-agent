spring:
  application:
    name: ai-transfer

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_transfer?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: your_username
    password: your_password

server:
  port: 8876

mybatis-plus:
  configuration:
    # 日志输出到控制台中
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
